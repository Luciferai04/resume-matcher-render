apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: resume-matcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: resume-matcher-backend:latest # Same as backend image
        command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
        envFrom:
        - configMapRef:
            name: resume-matcher-config
        - secretRef:
            name: resume-matcher-secrets
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
