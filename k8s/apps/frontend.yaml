apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: resume-matcher
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: resume-matcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: resume-matcher-frontend:latest # Replace with actual image
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: resume-matcher-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 300m
            memory: 512Mi
