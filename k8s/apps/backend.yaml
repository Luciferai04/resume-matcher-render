apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: resume-matcher
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: resume-matcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: resume-matcher-backend:latest # Replace with actual image
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: resume-matcher-config
        - secretRef:
            name: resume-matcher-secrets
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
