apiVersion: v1
kind: ConfigMap
metadata:
  name: resume-matcher-config
  namespace: resume-matcher
data:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/resume_matcher"
  REDIS_URL: "redis://redis-service:6379/0"
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4o"
  NODE_ENV: "production"
  PYTHONUNBUFFERED: "1"
