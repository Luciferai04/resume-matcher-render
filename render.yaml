services:
  # Managed PostgreSQL Database
  - type: psql
    name: rm-database
    plan: free

  # Managed Redis for Celery Broker
  - type: redis
    name: rm-redis
    plan: free
    maxmemoryPolicy: noeviction

  # FastAPI Backend Service
  - type: web
    name: rm-backend
    env: docker
    dockerContext: apps/backend
    dockerfilePath: apps/backend/Dockerfile
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rm-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rm-redis
          property: connectionString
      # LLM Configurations (Must be inputted in the dashboard)
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*" # Required so your frontend can communicate with the backend

  # Celery Background Worker
  - type: worker
    name: rm-worker
    env: docker
    dockerContext: apps/backend
    dockerfilePath: apps/backend/Dockerfile
    dockerCommand: celery -A app.worker.celery_app worker --loglevel=info
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rm-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rm-redis
          property: connectionString
      # LLM Configurations (Must be inputted in the dashboard matching backend)
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: LLM_API_KEY
        sync: false

  # Next.js Frontend Service
  - type: web
    name: rm-frontend
    env: docker
    dockerContext: apps/frontend
    dockerfilePath: apps/frontend/Dockerfile
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: rm-backend
          property: envVar:RENDER_EXTERNAL_URL
